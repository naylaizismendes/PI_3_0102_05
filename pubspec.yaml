name: rpg_mobile_2026
description: "PI3 - RPG Interativo com Geolocalização - Campus I PUC-Campinas"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^13.0.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.4
  shared_preferences: ^2.2.3
  audioplayers: ^6.6.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/ambients/
    - assets/images/jogador/
    - assets/data/
    - assets/audio/
